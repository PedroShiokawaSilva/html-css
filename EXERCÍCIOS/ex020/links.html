<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color:  rgb(134, 132, 132);
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
            
        }
        a:visited{
            color: darkred;
        }
        a:hover{
            color: black;
            text-decoration: underline;

        }
        .especial{
            background-color: black;
        }
        a:active{
            color: blue;
        }
        .especial::before{
            content: '-->';
        }
        .especial::after{
            content: '<--';
            
        }
        h1{
            color: rgb(216, 209, 209);
            
        }
        main{
            
        }
    </style>
</head>
<body>
    <h1>Personalisando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositório Github</a></li>
         <li><a href="https://youtube.com/cursoemvideo/" target="_blank" class="especial">Canal do youtube</a></li>
          <li><a href="https://www.cursoemvideo.com" target="_blank">Site do Curso em video</a></li>
          
    </ul>
</body>
</html>
