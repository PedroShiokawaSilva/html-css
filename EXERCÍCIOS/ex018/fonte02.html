<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'love';
            src: url('fontes/love\ larry\ ttf.ttf' ) format('truetype');
            font-weight: normal;
            font-style: normal;
            /*Tipos de format()
            -opentype (otf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat(aple advanced Typography)*/
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(80, 78, 78);
        }
        h1{
            font-family: 'love', Times, serif;
            font-size: 3em;
            font-weight: normal;
            color: white;
        }
        p{
            color: white;
        }
    </style>
</head>
<body>
    <h1>Olá mundo</h1>
    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Beatae quisquam, aliquam dolorum laboriosam quidem quos ut nisi! Tempora, officiis, harum iure omnis libero, quas qui neque consectetur nisi laborum possimus?</p>
    
</body>
</html>
